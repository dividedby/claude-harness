name: Weekly Harness Research & Update

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Research and update harness
        uses: anthropics/claude-code-action@v1
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run a harness research update cycle.

            Step 1 - Research (lean, always max_results: 3):
              perplexity_ask: "Claude Code best practices skills agents hooks 2026 latest"
              perplexity_ask: "Claude Code CLAUDE.md memory patterns April 2026 updates"

            Step 2 - Read and compare:
              Read research/claude-code-patterns.md and research/perplexity-mcp.md
              Compare with research findings

            Step 3 - Update only what changed (surgical):
              Update topic files where outdated
              Update MEMORY.md index dates for changed files
              Do NOT change working commands or hooks unless research confirms a problem

            Step 4 - If nothing changed:
              Append to research/audit-log.md: "YYYY-MM-DD: No changes found."
          claude_args: "--max-turns 12"

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: harness/weekly-update-${{ github.run_id }}
          title: "harness: weekly research audit"
          body: "Automated weekly update. Review before merging. Never auto-merged."
          commit-message: "harness: weekly research audit"
          delete-branch: true
