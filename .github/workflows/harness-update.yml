name: Weekly Harness Research & Update

on:
  schedule:
    - cron: '0 7 * * 0'   # Sunday 2am CDT (7am UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Research and update harness
        uses: anthropics/claude-code-action@v1
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Run a harness research update cycle. Perplexity is available via
            npx @perplexity-ai/mcp-server — use it sparingly (max_results: 3).

            Step 1 — Research (lean):
              Ask Perplexity: "Claude Code best practices skills agents hooks 2026 latest"
              Ask Perplexity: "Claude Code CLAUDE.md memory patterns April 2026 updates"
              Ask Perplexity: "Claude Code OAuth GitHub Actions 2026"

            Step 2 — Compare with research/ topic files.

            Step 3 — Update only what changed (surgical edits only).
              Update topic file dates in MEMORY.md for any changed files.
              Do NOT change commands, hooks, or agents unless research confirms a problem.

            Step 4 — If nothing changed:
              Append to research/audit-log.md: "YYYY-MM-DD: No changes found."
          claude_args: "--max-turns 12"

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: harness/weekly-update-${{ github.run_id }}
          title: "harness: weekly research audit"
          body: |
            Automated weekly update from Perplexity research.
            Review changes before merging. Never auto-merged.
          commit-message: "harness: weekly research audit"
          delete-branch: true
