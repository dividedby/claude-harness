name: Issue to PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  implement:
    if: contains(github.event.label.name, 'claude')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Implement the feature or fix described in this issue.
            Read CLAUDE.md and docs/project.md first.
            Minimal targeted changes only.
            Apply /project:done check criteria before finishing.
            Open a draft PR with the changes.
          claude_args: "--max-turns 20"
