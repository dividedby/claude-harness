name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR. Read CLAUDE.md for project rules.
            Check correctness, security, unnecessary complexity, rule violations.
            Post findings as review comments. Direct and specific. Skip praise.
            End with: APPROVE or REQUEST CHANGES.
          claude_args: "--max-turns 5"
